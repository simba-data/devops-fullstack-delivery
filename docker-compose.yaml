services:
  postgres:
    image: postgres:15
    container_name: postgres-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=devops_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend 
    image: simba/backend:docker
    container_name: backend
    ports:
      - "5000:5000"
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 128M
        reservations:
          cpus: '0.10'
          memory: 64M
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/devops_db
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    image: simba/frontend:docker
    container_name: frontend
    ports:
      - "30080:80"
    depends_on:
      - backend

volumes:
  pgdata:
